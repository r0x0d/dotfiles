- defaults:
    link:
      create: true
      relink: true
- create:
    - ~/.bashrc.d
- link:
    ~/.bashrc.d/editor.bashrc: tools/bash/bash_rc_d/editor.bashrc
    ~/.bashrc.d/npm-global.bashrc: tools/bash/bash_rc_d/npm-global.bashrc
    ~/.bashrc.d/aliases.bashrc: tools/bash/bash_rc_d/aliases.bashrc
    ~/.bashrc.d/pyenv.bashrc: tools/bash/bash_rc_d/pyenv.bashrc
    ~/.bashrc.d/cargo.bashrc: tools/bash/bash_rc_d/cargo.bashrc
