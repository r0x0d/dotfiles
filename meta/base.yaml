- defaults:
    link:
      create: true
      relink: true

- create:
    - ~/Workspace
    - ~/.tmp
    - ~/.config

- shell:
  - ["git submodule update --init --recursive", Installing submodules]
  - ["git submodule sync", Syncing submodule remotes]
  - ["date > ~/.dotfiles_update", Logging last update]

- clean: [
    '~',
    '~/.config'
]
